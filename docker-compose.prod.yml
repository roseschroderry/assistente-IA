services:
  assistente-api:
    build: .
    restart: unless-stopped
    ports:
      - "8008:8008"
    env_file:
      - .env.production
    volumes:
      - assistente-data:/data
    environment:
      ELITE_DATA_DIR: /data
      ELITE_ENABLE_DANGEROUS_TOOLS: "0"
      ELITE_ENABLE_OPERATOR_MODE: "0"
      ELITE_FULL_ACCESS: "0"

volumes:
  assistente-data:
